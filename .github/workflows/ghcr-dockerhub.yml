name: Docker Manual Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag version (e.g., v1.0.0, latest)'
        required: true
        default: 'latest'

concurrency:
  group: docker-manual-publish-${{ github.ref }}-${{ inputs.image_tag }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}   # 自动使用当前仓库名 owner/repo

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write          # 推送 GHCR 必需
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release inputs
        run: |
          if [[ "${{ inputs.image_tag }}" =~ [[:space:]] ]]; then
            echo "image_tag must not contain spaces"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Set up QEMU for multi-platform build
        uses: docker/setup-qemu-action@v4

      # 仅登录 GHCR（使用 GITHUB_TOKEN 自动认证）
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 为 GHCR 生成元数据（标签等）
      - name: Extract metadata for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest
          flavor: |
            latest=false

      # 构建并推送多架构镜像（只推送到 GHCR）
      - name: Build and push multi-arch images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile     # 请改成你的 Dockerfile 路径
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}   # 只使用 GHCR 的标签
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 生成摘要信息（只显示 GHCR）
      - name: Generate summary
        run: |
          echo "### Docker images built and pushed successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags: ${{ inputs.image_tag }}, latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- Platforms: linux/amd64" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pull command" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${{ inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
